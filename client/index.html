<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>IntelligentForce – AI-Powered Business Automation</title>
    <meta name="description" content="IntelligentForce delivers AI-powered business automation for mid-market and enterprise companies worldwide. 9 specialised AI agents, 60% cost reduction, live in 2 weeks. Meet ALEX – your AI Operations Partner." />
    <meta name="keywords" content="AI business automation, AI agents, business process automation, ALEX AI assistant, IntelligentForce, enterprise AI, workflow automation, AI consulting, SaaS AI platform, AI integration" />
    <meta name="author" content="IntelligentForce" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://intelligentforce.ai/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://intelligentforce.ai/" />
    <meta property="og:title" content="IntelligentForce – AI-Powered Business Automation" />
    <meta property="og:description" content="9 specialised AI agents that automate your business operations. 60% cost reduction. Live in 2 weeks. Meet ALEX – your AI Operations Partner." />
    <meta property="og:image" content="https://intelligentforce.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="IntelligentForce" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://intelligentforce.ai/" />
    <meta name="twitter:title" content="IntelligentForce – AI-Powered Business Automation" />
    <meta name="twitter:description" content="9 specialised AI agents that automate your business operations. 60% cost reduction. Live in 2 weeks." />
    <meta name="twitter:image" content="https://intelligentforce.ai/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "IntelligentForce",
      "url": "https://intelligentforce.ai",
      "logo": "https://intelligentforce.ai/og-image.png",
      "description": "AI-powered business automation platform for mid-market and enterprise companies worldwide. 9 specialised AI agents delivering measurable results.",
      "email": "hello@intelligentforce.ai",
      "foundingDate": "2026",
      "areaServed": "Worldwide",
      "serviceType": "AI Business Automation",
      "sameAs": [
        "https://intelligentforce.ai"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "AI Automation Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Business Automation",
              "description": "End-to-end business process automation using 9 specialised AI agents"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Business Health Check",
              "description": "Free AI-powered assessment of your business automation potential"
            }
          }
        ]
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%">
    </script>
  </body>
</html>
